# Application
spring.application.name=chatconnecting
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database Configuration - Uses environment variables from Railway
spring.datasource.url=${DB_URL:jdbc:mysql://yamanote.proxy.rlwy.net:32165/railway}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:RplmnHrRmMnblMrqrDOlRyzfqjfgDJlO}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=${JWT_SECRET:replace-with-at-least-32-characters-secret-key}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration (allows frontend to communicate with backend)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://chat-connect-ochre.vercel.app,https://chatconnect-production.up.railway.app}
app.ws.allowed-origins=${APP_WS_ALLOWED_ORIGINS:http://localhost:5173,wss://chat-connect-ochre.vercel.app,wss://chatconnect-production.up.railway.app}

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Server Configuration
server.port=${PORT:8080}
server.shutdown=graceful
server.compression.enabled=true

# Firebase Configuration
firebase.config.path=${FIREBASE_CONFIG_PATH:}

# Logging
logging.level.root=INFO
logging.level.com.chatconnecting=DEBUG
